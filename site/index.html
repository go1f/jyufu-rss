<!DOCTYPE html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>JYUFU RSS</title>
    <meta
      name="description"
      content="一个由本机采集、通过 GitHub Pages 对外发布的个人资讯聚合页。"
    />
    <link rel="stylesheet" href="./styles.css" />
  </head>
  <body>
    <main class="page">
      <section class="hero">
        <p class="eyebrow">JYUFU RSS</p>
        <h1>把分散资讯收进一个安静的入口</h1>
        <p class="intro">
          微博保留站内展开、图片和评论。微信公众号只保留标题、摘要，并通过标题跳转到原文。
        </p>
        <div class="meta" id="site-meta">
          <span>正在载入站点信息...</span>
        </div>
      </section>

      <section class="workspace">
        <aside class="sidebar">
          <section class="sidebar-panel">
            <div class="panel-head">
              <h2>订阅入口</h2>
              <p>适合浏览器和 RSS 阅读器。</p>
            </div>
            <div class="subscription-list" id="subscription-links">
              <span class="loading">正在载入订阅入口...</span>
            </div>
          </section>

          <section class="sidebar-panel">
            <div class="panel-head">
              <h2>来源</h2>
              <p>切换不同内容源。</p>
            </div>
            <div id="source-filters" class="filter-stack"></div>
          </section>

          <section class="sidebar-panel">
            <div class="panel-head">
              <h2>Topics</h2>
              <p>按标签快速聚焦主题。</p>
            </div>
            <div id="tag-filters" class="filter-stack"></div>
          </section>
        </aside>

        <section class="content-panel">
          <div class="panel-head content-head">
            <div>
              <h2>最近更新</h2>
              <p>标题点击即跳转原文。微博可展开详情，公众号保持摘要视图。</p>
            </div>
            <div class="content-note">Apple-style clean reading</div>
          </div>

          <div id="feed-list" class="feed-list">
            <p class="loading">正在载入内容...</p>
          </div>
        </section>
      </section>
    </main>

    <template id="item-template">
      <article class="card">
        <div class="card-top">
          <span class="source"></span>
          <time class="time"></time>
        </div>

        <a class="title-link" target="_blank" rel="noreferrer noopener">
          <h3 class="title"></h3>
        </a>

        <div class="summary-block">
          <p class="summary"></p>
          <button class="toggle summary-toggle" type="button" hidden></button>
        </div>

        <div class="media-grid" hidden></div>

        <div class="detail-block" hidden>
          <div class="rich-content content"></div>
          <section class="comments" hidden>
            <h4 class="comments-title"></h4>
            <div class="rich-content comments-body"></div>
          </section>
        </div>

        <div class="card-bottom">
          <span class="author"></span>
          <div class="actions">
            <button class="toggle detail-toggle" type="button" hidden></button>
          </div>
        </div>
      </article>
    </template>

    <script src="./app.js" defer></script>
  </body>
</html>
